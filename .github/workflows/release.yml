name: Nicy Runtime Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure == true }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: win-msvc-x64, target: x86_64-pc-windows-msvc, os: windows-latest, use_msvc: true }
          - { name: win-msvc-x86, target: i686-pc-windows-msvc, os: windows-latest, use_msvc: true }
          - { name: win-msvc-arm, target: aarch64-pc-windows-msvc, os: windows-latest, use_msvc: true, allow_failure: true }
          - { name: win-x64, target: x86_64-pc-windows-gnu, os: windows-latest }
          - { name: win-x86, target: i686-pc-windows-gnu, os: windows-latest }
          - { name: win-arm, target: aarch64-pc-windows-gnullvm, os: windows-latest, allow_failure: true }
          - { name: mac-x64, target: x86_64-apple-darwin, os: macos-latest }
          - { name: mac-arm, target: aarch64-apple-darwin, os: macos-latest }
          - { name: linux-x64, target: x86_64-unknown-linux-gnu.2.17, os: ubuntu-latest }
          - { name: linux-arm, target: aarch64-unknown-linux-gnu.2.17, os: ubuntu-latest }
          - { name: linux-x86, target: i686-unknown-linux-gnu.2.17, os: ubuntu-latest }
          - { name: android-arm, target: aarch64-linux-android, os: ubuntu-latest, use_cross: true }
          - { name: android-v7, target: armv7-linux-androideabi, os: ubuntu-latest, use_cross: true }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust Stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Target
        shell: pwsh
        run: |
          $pureTarget = "${{ matrix.target }}".Split(".")[0]
          rustup target add $pureTarget

      - name: Setup Zig
        if: ${{ !matrix.use_cross && !matrix.use_msvc }}
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.14.0

      - name: Install Tools
        shell: pwsh
        run: |
          if ("${{ matrix.use_cross }}" -eq "true") {
            cargo install cross --git https://github.com/cross-rs/cross --locked
          } elseif ("${{ matrix.use_msvc }}" -ne "true") {
            cargo install cargo-zigbuild --locked
          }

      - name: Build
        shell: pwsh
        run: |
          $target = "${{ matrix.target }}"
          $buildOk = $true

          if ("${{ matrix.use_msvc }}" -eq "true") {
            cargo build --release --target $target --manifest-path Cargo.toml --target-dir target
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Build primario falhou. Tentando fallback seguro (clean + rebuild)..." -ForegroundColor Yellow
              cargo clean --target $target
              cargo build --release --target $target --manifest-path Cargo.toml --target-dir target
              if ($LASTEXITCODE -ne 0) { $buildOk = $false }
            }
          } else {
            ./build.ps1 -target "${{ matrix.name }}" -force
            if ($LASTEXITCODE -ne 0) {
              Write-Host "Build primario falhou. Tentando fallback seguro..." -ForegroundColor Yellow

              if ("${{ matrix.use_cross }}" -eq "true") {
                cross build --release --target $target --manifest-path Cargo.toml --target-dir target
              } elseif ("${{ matrix.name }}" -like "win-*") {
                cargo build --release --target $target --manifest-path Cargo.toml --target-dir target
              } else {
                cargo zigbuild --release --target $target --manifest-path Cargo.toml --target-dir target
              }

              if ($LASTEXITCODE -ne 0) { $buildOk = $false }
            }
          }

          if (-not $buildOk) {
            throw "Build falhou no modo primario e no fallback para target $target"
          }

      - name: Validate Runtime Exports
        shell: pwsh
        run: |
          $cleanTarget = "${{ matrix.target }}".Replace(".2.17", "")
          $outDir = "target/$cleanTarget/release"

          if ("${{ matrix.name }}" -like "win-*") {
            $libPath = Join-Path $outDir "nicyrtdyn.dll"
          } elseif ("${{ matrix.name }}" -like "mac-*") {
            $libPath = Join-Path $outDir "libnicyrtdyn.dylib"
          } else {
            $libPath = Join-Path $outDir "libnicyrtdyn.so"
          }

          if (-not (Test-Path $libPath)) {
            throw "Biblioteca nao encontrada para validacao: $libPath"
          }

          if ($IsWindows) {
            $dumpbinCmd = Get-Command dumpbin -ErrorAction SilentlyContinue
            if ($null -eq $dumpbinCmd) {
              $dumpbinPath = Get-ChildItem "C:\Program Files\Microsoft Visual Studio" -Filter dumpbin.exe -Recurse -ErrorAction SilentlyContinue |
                Select-Object -ExpandProperty FullName -First 1
            } else {
              $dumpbinPath = $dumpbinCmd.Source
            }

            if ([string]::IsNullOrWhiteSpace($dumpbinPath) -or -not (Test-Path $dumpbinPath)) {
              throw "dumpbin.exe nao encontrado no runner para validar exports da DLL."
            }

            $exportsOutput = & $dumpbinPath /exports $libPath | Out-String
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao executar dumpbin em $libPath"
            }
          } elseif ($IsMacOS) {
            $nmCmd = Get-Command nm -ErrorAction SilentlyContinue
            if ($null -eq $nmCmd) {
              throw "nm nao encontrado no runner macOS para validar exports."
            }
            $exportsOutput = & $nmCmd.Source -gU $libPath | Out-String
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao executar nm em $libPath"
            }
          } else {
            $nmCmd = Get-Command nm -ErrorAction SilentlyContinue
            if ($null -eq $nmCmd) {
              throw "nm nao encontrado no runner Linux para validar exports."
            }
            $exportsOutput = & $nmCmd.Source -D --defined-only $libPath | Out-String
            if ($LASTEXITCODE -ne 0) {
              throw "Falha ao executar nm em $libPath"
            }
          }

          $requiredSymbols = @(
            "nicy_start",
            "nicy_eval",
            "nicy_compile",
            "nicy_version",
            "nicy_luau_version"
          )

          foreach ($symbol in $requiredSymbols) {
            $escaped = [Regex]::Escape($symbol)
            $patterns = @(
              "(?im)$escaped",
              "(?im)_$escaped",
              "(?im)_$escaped@\d+"
            )

            $found = $false
            foreach ($p in $patterns) {
              if ($exportsOutput -match $p) {
                $found = $true
                break
              }
            }

            if (-not $found) {
              Write-Host "Nao foi possivel validar simbolo '$symbol' em $libPath" -ForegroundColor Red
              Write-Host "Dump parcial de exports para diagnostico:" -ForegroundColor Yellow
              $exportsOutput.Split([Environment]::NewLine) | Select-Object -First 140 | ForEach-Object { Write-Host $_ }
              throw "Export obrigatorio ausente na biblioteca ($libPath): $symbol"
            }
          }

          Write-Host "Exports validados com sucesso: $($requiredSymbols -join ', ')"

      - name: Package Artifact
        shell: pwsh
        run: |
          $cleanTarget = "${{ matrix.target }}".Replace(".2.17", "")
          $outDir = "target/$cleanTarget/release"

          if ("${{ matrix.name }}" -like "win-*") {
            $fileName = "nicyrtdyn.dll"
          } elseif ("${{ matrix.name }}" -like "mac-*") {
            $fileName = "libnicyrtdyn.dylib"
          } else {
            $fileName = "libnicyrtdyn.so"
          }

          $sourcePath = Join-Path $outDir $fileName
          if (-not (Test-Path $sourcePath)) {
            throw "Binary not found: $sourcePath"
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $artifactDir = "dist/nicyrtdyn-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null

          Copy-Item $sourcePath (Join-Path $artifactDir $fileName) -Force
          Compress-Archive -Path "$artifactDir/*" -DestinationPath "dist/nicyrtdyn-${{ matrix.name }}.zip" -Force

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.zip
          fail_on_unmatched_files: true
          body: |
            nicyrtdyn runtime ${{ github.ref_name }} (0.1.0)
            - rust toolchain: stable
            - no binary compression
            - artifacts: zip per target with canonical library name inside
            - build fallback: tentativa secundaria quando o build primario falha
            - export validation: symbols obrigatorios validados em Windows/macOS/Linux/Android
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
